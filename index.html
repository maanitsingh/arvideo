<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster AR Video Player</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        .mindar-ui-scanning, .mindar-ui-compatibility { display: none !important; }
        
        /* Custom screen overlay button to unlock video playback */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            font-family: sans-serif;
        }
        #start-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #007bff;
            color: white; border: none;
            border-radius: 5px; cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <p>Ready to start the AR Experience?</p>
        <button id="start-btn">Tap to Scan Poster</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;" 
             embedded vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="ar-video" src="./my_edited_video.mp4" 
                   preload="auto" loop="true" muted playsinline webkit-playsinline>
            </video>
        </a-assets>

        <a-camera look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="poster-anchor">
            <a-video src="#ar-video" width="2" height="2" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

    <script>
        const anchorEl = document.querySelector('#poster-anchor');
        const videoEl = document.querySelector('#ar-video');
        const overlay = document.querySelector('#overlay');
        const startBtn = document.querySelector('#start-btn');

        // Unlock browser media restrictions on user tap
        startBtn.addEventListener('click', () => {
            videoEl.play();
            videoEl.pause(); // Pre-loads the video context smoothly
            overlay.style.display = 'none'; // Hides the button screen
        });

        anchorEl.addEventListener("targetFound", () => {
            console.log("Poster spotted!");
            videoEl.play().catch(err => console.log(err));
        });

        anchorEl.addEventListener("targetLost", () => {
            console.log("Poster lost!");
            videoEl.pause();
        });
    </script>
</body>
</html>
