<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster AR Video Player</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Hides all loading screens for a completely clean camera view */
        .mindar-ui-scanning, .mindar-ui-compatibility { display: none !important; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;" 
             embedded vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="ar-video" src="./my_edited_video.mp4" 
                   preload="auto" loop="true" muted playsinline webkit-playsinline>
            </video>
        </a-assets>

        <a-camera look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="poster-anchor">
            <a-video src="#ar-video" width="1" height="1.5" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

    <script>
        const anchorEl = document.querySelector('#poster-anchor');
        const videoEl = document.querySelector('#ar-video');

        // Play video when the camera recognizes the poster
        anchorEl.addEventListener("targetFound", () => {
            videoEl.play().catch(err => console.log("Video waiting for user interaction:", err));
        });

        // Pause video when the camera looks away
        anchorEl.addEventListener("targetLost", () => {
            videoEl.pause();
        });
    </script>
</body>
</html>
